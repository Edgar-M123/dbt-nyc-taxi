version: 2

models:
  - name: stg_yellow_trips
    description: >
      Staging model for NYC yellow taxi trip data. Performs a 1:1 mapping of the raw source
      with column renames to a consistent snake_case convention and unix timestamp conversion
      to proper timestamp types. No filtering or business logic is applied — NULLs and
      erroneous records are preserved for downstream models to handle.
    columns:
      - name: vendor_id
        description: "TPEP provider code. 1 = Creative Mobile Technologies (CMT); 2 = VeriFone Inc. (VTS)"
        data_tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values: [1, 2]
              config:
                severity: warn

      - name: pickup_timestamp
        description: "Date and time when the meter was engaged (converted from unix epoch microseconds)"
        data_tests:
          - not_null

      - name: dropoff_timestamp
        description: "Date and time when the meter was disengaged (converted from unix epoch microseconds)"
        data_tests:
          - not_null

      - name: passenger_count
        description: "Number of passengers in the vehicle. This is a driver-reported value"
        data_tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 9
              config:
                severity: warn

      - name: trip_distance_miles
        description: "Elapsed trip distance in miles as reported by the taximeter"
        data_tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              min_value: 0
              config:
                severity: warn

      - name: rate_code_id
        description: "Rate code in effect at end of trip. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride"
        data_tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              config:
                severity: warn

      - name: store_and_fwd_flag
        description: "Whether the trip record was held in vehicle memory before sending to the vendor. Y=store and forward, N=not a store and forward trip"
        data_tests:
          - accepted_values:
              values: ['Y', 'N']
              config:
                severity: warn

      - name: pickup_location_id
        description: "TLC taxi zone ID where the meter was engaged (pickup location)"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: dropoff_location_id
        description: "TLC taxi zone ID where the meter was disengaged (dropoff location)"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: payment_type
        description: "How the passenger paid. 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip"
        data_tests:
          - not_null:
              config:
                severity: warn
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              config:
                severity: warn

      - name: fare_amount
        description: "Time-and-distance fare calculated by the meter (USD). Can be negative for refunded trips"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: extra_charges_amount
        description: "Miscellaneous extras and surcharges such as rush hour and overnight charges (USD)"

      - name: mta_tax_amount
        description: "MTA tax automatically triggered based on the metered rate in use (USD)"

      - name: tip_amount
        description: "Tip amount. Automatically populated for credit card tips; cash tips are not included (USD)"

      - name: tolls_amount
        description: "Total amount of all tolls paid during the trip (USD)"

      - name: improvement_surcharge_amount
        description: "Improvement surcharge assessed on hailed trips at the flag drop (USD)"

      - name: congestion_surcharge_amount
        description: "Congestion surcharge for trips that begin, end, or pass through Manhattan south of 96th St (USD)"

      - name: airport_fee_amount
        description: "Airport pick-up or drop-off fee (USD)"

      - name: cbd_congestion_fee
        description: "Central Business District congestion fee (USD)"

      - name: total_amount
        description: "Total amount charged to passengers. Does not include cash tips (USD)"
        data_tests:
          - not_null:
              config:
                severity: warn
