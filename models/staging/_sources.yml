sources:
  - name: raw_taxi
    description: "Raw NYC Taxi & Limousine Commission (TLC) trip data loaded into Snowflake"
    database: raw
    schema: taxi
    config:
      enabled: true
    tables:
      - name: yellow_tripdata
        description: >
          Raw yellow taxi trip records from the NYC TLC.
          Each row represents a single trip with pickup/dropoff timestamps stored
          as integer unix epoch microseconds, and location IDs referencing TLC taxi zones.
          Data may contain erroneous records (e.g. pickup after dropoff), refunded trips,
          and duplicate rows.
        columns:
          - name: vendorid
            description: "TPEP provider code. 1 = Creative Mobile Technologies (CMT); 2 = VeriFone Inc. (VTS)"
          - name: tpep_pickup_datetime
            description: "Pickup timestamp as unix epoch in microseconds"
          - name: tpep_dropoff_datetime
            description: "Dropoff timestamp as unix epoch in microseconds"
          - name: passenger_count
            description: "Number of passengers (driver-reported)"
          - name: trip_distance
            description: "Elapsed trip distance in miles reported by the taximeter"
          - name: ratecodeid
            description: "Rate code. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride"
          - name: store_and_fwd_flag
            description: "Whether the trip record was held in vehicle memory before sending. Y=store and forward, N=not"
          - name: pulocationid
            description: "TLC taxi zone ID where the meter was engaged (pickup)"
          - name: dolocationid
            description: "TLC taxi zone ID where the meter was disengaged (dropoff)"
          - name: payment_type
            description: "Payment method. 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip"
          - name: fare_amount
            description: "Time-and-distance fare calculated by the meter (USD)"
          - name: extra
            description: "Miscellaneous extras and surcharges (e.g. rush hour, overnight charges) (USD)"
          - name: mta_tax
            description: "MTA tax automatically triggered based on the metered rate (USD)"
          - name: tip_amount
            description: "Tip amount (automatically populated for credit card payments, cash tips not included) (USD)"
          - name: tolls_amount
            description: "Total amount of all tolls paid in trip (USD)"
          - name: improvement_surcharge
            description: "Improvement surcharge assessed on hailed trips at the flag drop (USD)"
          - name: congestion_surcharge
            description: "Congestion surcharge for trips in Manhattan south of 96th St (USD)"
          - name: airport_fee
            description: "Airport pick-up/drop-off fee (USD)"
          - name: cbd_congestion_fee
            description: "Central Business District congestion fee (USD)"
          - name: total_amount
            description: "Total amount charged to passengers (does not include cash tips) (USD)"
