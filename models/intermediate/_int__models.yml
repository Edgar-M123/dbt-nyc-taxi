
version: 2

models:
  - name: int_yellow_trips_deduplicated
    description: "Intermediate yellow trip data"
    columns:
      - name: trip_id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: pickup_date_key
        description: "Key to date dimension"
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: dropoff_date_key
        description: "Key to date dimension"
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: pickup_time_key
        description: "Key to time dimension"
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_minute')
                field: time_key
      - name: dropoff_time_key
        description: "Key to time dimension"
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_minute')
                field: time_key
