version: 2

models:
  - name: int_yellow_trips_cleaned
    description: >
      Cleaned and deduplicated yellow taxi trips. Applies business logic to the raw staging data:
      filters out trips where pickup is after dropoff, removes refunded trip pairs (matching
      positive/negative fare amounts), excludes zero-fare records, and deterministically
      deduplicates by keeping the row with the longest distance (fare as tiebreaker).
      Adds a surrogate key (trip_id) and integer date/time keys for joining to dimensions.
    columns:
      - name: trip_id
        description: "Surrogate primary key generated from vendor_id, timestamps, locations, fare, and distance"
        data_tests:
          - unique
          - not_null

      - name: pickup_date_key
        description: "Integer date key (YYYYMMDD) for the pickup date. Joins to dim_date.date_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: dropoff_date_key
        description: "Integer date key (YYYYMMDD) for the dropoff date. Joins to dim_date.date_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: pickup_time_key
        description: "Integer time key (HHMM, e.g. 1430 = 2:30 PM) for pickup time. Joins to dim_minute.time_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_minute')
              field: time_key

      - name: dropoff_time_key
        description: "Integer time key (HHMM, e.g. 1430 = 2:30 PM) for dropoff time. Joins to dim_minute.time_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_minute')
              field: time_key

      - name: vendor_id
        description: "TPEP provider code. 1 = Creative Mobile Technologies; 2 = VeriFone Inc."
        data_tests:
          - not_null

      - name: pickup_timestamp
        description: "Date and time when the meter was engaged"
        data_tests:
          - not_null

      - name: dropoff_timestamp
        description: "Date and time when the meter was disengaged"
        data_tests:
          - not_null

      - name: passenger_count
        description: "Number of passengers in the vehicle (driver-reported)"

      - name: trip_distance_miles
        description: "Elapsed trip distance in miles reported by the taximeter"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              config:
                severity: warn

      - name: rate_code_id
        description: "Rate code in effect. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride"

      - name: store_and_fwd_flag
        description: "Whether the trip record was held in vehicle memory before sending. Y/N"

      - name: pickup_location_id
        description: "TLC taxi zone ID where the meter was engaged"

      - name: dropoff_location_id
        description: "TLC taxi zone ID where the meter was disengaged"

      - name: payment_type
        description: "Payment method. 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided"

      - name: fare_amount
        description: "Original time-and-distance fare from the meter (USD). Preserves sign from source"
        data_tests:
          - not_null

      - name: abs_fare_amount
        description: "Absolute value of the fare amount (USD). Always positive"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: extra_charges_amount
        description: "Miscellaneous extras and surcharges (USD)"

      - name: mta_tax_amount
        description: "MTA tax (USD)"

      - name: tip_amount
        description: "Tip amount — credit card tips only, cash tips not included (USD)"

      - name: tolls_amount
        description: "Total tolls paid during the trip (USD)"

      - name: improvement_surcharge_amount
        description: "Improvement surcharge at flag drop (USD)"

      - name: congestion_surcharge_amount
        description: "Congestion surcharge for Manhattan south of 96th St (USD)"

      - name: airport_fee_amount
        description: "Airport pick-up/drop-off fee (USD)"

      - name: cbd_congestion_fee
        description: "Central Business District congestion fee (USD)"

      - name: total_amount
        description: "Total amount charged to passengers, excluding cash tips (USD)"
