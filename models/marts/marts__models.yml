version: 2

models:
  - name: yellow_trips
    description: >
      Final fact table for NYC yellow taxi trips. Joins cleaned trip data to date and time
      dimensions for both pickup and dropoff, providing human-readable attributes like
      month name, year, hour, and AM/PM directly on the fact row.
      This is the primary model for BI consumption.
    columns:
      - name: trip_id
        description: "Surrogate primary key for each unique trip"
        data_tests:
          - unique
          - not_null

      - name: vendor_id
        description: "TPEP provider code. 1 = Creative Mobile Technologies; 2 = VeriFone Inc."

      - name: pickup_timestamp
        description: "Date and time when the meter was engaged"

      - name: dropoff_timestamp
        description: "Date and time when the meter was disengaged"

      - name: passenger_count
        description: "Number of passengers in the vehicle (driver-reported)"

      - name: trip_distance_miles
        description: "Elapsed trip distance in miles reported by the taximeter"

      - name: rate_code_id
        description: "Rate code. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride"

      - name: store_and_fwd_flag
        description: "Whether the trip record was held in vehicle memory before sending. Y/N"

      - name: pickup_location_id
        description: "TLC taxi zone ID for pickup"

      - name: dropoff_location_id
        description: "TLC taxi zone ID for dropoff"

      - name: payment_type
        description: "Payment method. 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided"

      - name: fare_amount
        description: "Time-and-distance fare from the meter (USD)"

      - name: abs_fare_amount
        description: "Absolute value of fare amount (USD)"

      - name: extra_charges_amount
        description: "Miscellaneous extras and surcharges (USD)"

      - name: mta_tax_amount
        description: "MTA tax (USD)"

      - name: tip_amount
        description: "Tip amount — credit card tips only (USD)"

      - name: tolls_amount
        description: "Total tolls paid (USD)"

      - name: improvement_surcharge_amount
        description: "Improvement surcharge at flag drop (USD)"

      - name: congestion_surcharge_amount
        description: "Congestion surcharge (USD)"

      - name: airport_fee_amount
        description: "Airport fee (USD)"

      - name: cbd_congestion_fee
        description: "Central Business District congestion fee (USD)"

      - name: total_amount
        description: "Total charged to passenger, excluding cash tips (USD)"

      - name: pickup_date_key
        description: "Integer date key (YYYYMMDD) for pickup date"

      - name: pickup_time_key
        description: "Integer time key (HHMM) for pickup time"

      - name: pickup_month_num
        description: "Month number (1-12) of the pickup date"

      - name: pickup_month_name
        description: "Full month name of the pickup date (e.g. January)"

      - name: pickup_year_num
        description: "Four-digit year of the pickup date"

      - name: pickup_hour
        description: "Hour of the pickup time (0-23)"

      - name: pickup_am_pm
        description: "AM or PM indicator for the pickup time"

      - name: dropoff_date_key
        description: "Integer date key (YYYYMMDD) for dropoff date"

      - name: dropoff_time_key
        description: "Integer time key (HHMM) for dropoff time"

      - name: dropoff_month_num
        description: "Month number (1-12) of the dropoff date"

      - name: dropoff_month_name
        description: "Full month name of the dropoff date (e.g. January)"

      - name: dropoff_year_num
        description: "Four-digit year of the dropoff date"

      - name: dropoff_hour
        description: "Hour of the dropoff time (0-23)"

      - name: dropoff_am_pm
        description: "AM or PM indicator for the dropoff time"

  - name: dim_date
    description: >
      Date dimension generated from a date spine. Contains one row per calendar day from
      the configured start to end date. Provides calendar attributes like month, year,
      day of week, quarter, etc. for joining to fact tables via date_key.
    columns:
      - name: date_key
        description: "Integer date key in YYYYMMDD format (e.g. 20250315). Primary key"
        data_tests:
          - unique
          - not_null

  - name: dim_minute
    description: >
      Time-of-day dimension at minute granularity. Contains 1,440 rows (one per minute
      in a 24-hour day). Provides 12-hour and 24-hour formatted time labels, hour, minute,
      and AM/PM for joining to fact tables via time_key.
    columns:
      - name: time_key
        description: "Integer time key in HHMM format (e.g. 1430 = 2:30 PM). Primary key"
        data_tests:
          - unique
          - not_null

      - name: hour
        description: "Hour of the day (0-23)"

      - name: minute
        description: "Minute of the hour (0-59)"

      - name: hour_12_hr
        description: "Hour in 12-hour format (1-12)"

      - name: am_pm
        description: "AM or PM indicator"

      - name: time_label_12_hr
        description: "Formatted time string in 12-hour format (e.g. '02:30 PM')"

      - name: time_label_24_hr
        description: "Formatted time string in 24-hour format (e.g. '14:30')"
